name: PR Merge Guard

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: pr-merge-guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate secure merge requirements
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull_request payload found.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const failures = [];

            if (pr.draft) {
              failures.push('PR is in draft state.');
            }

            const mergeableState = (pr.mergeable_state || '').toLowerCase();
            if (mergeableState === 'dirty') {
              failures.push('PR has merge conflicts.');
            }
            if (mergeableState === 'behind') {
              failures.push('PR branch is behind base branch. Rebase or merge base branch first.');
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const latestStateByUser = new Map();
            for (const review of reviews) {
              if (!review.user || review.user.type === 'Bot') {
                continue;
              }
              latestStateByUser.set(review.user.login, review.state);
            }

            let approvals = 0;
            let changesRequested = 0;
            for (const state of latestStateByUser.values()) {
              if (state === 'APPROVED') approvals += 1;
              if (state === 'CHANGES_REQUESTED') changesRequested += 1;
            }

            if (approvals < 1) {
              failures.push('At least one human approval is required.');
            }
            if (changesRequested > 0) {
              failures.push('There are outstanding CHANGES_REQUESTED reviews.');
            }

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const unsignedCommits = commits
              .filter((commit) => !commit.commit?.verification?.verified)
              .map((commit) => commit.sha.substring(0, 7));

            if (unsignedCommits.length > 0) {
              failures.push(`All commits must be signed. Unsigned commits: ${unsignedCommits.join(', ')}`);
            }

            if (failures.length > 0) {
              core.setFailed(failures.join('\n'));
              return;
            }

            core.info('PR passed merge guard checks.');
