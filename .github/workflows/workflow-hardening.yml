name: Workflow Hardening

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint GitHub workflows
        uses: rhysd/actionlint@v1
